<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Premium Store</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar" style="display: flex; justify-content: space-between; padding: 20px 5%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div class="logo"><a href="index.html" style="font-weight: 700; color: #333; text-decoration: none; font-size: 24px;">🛍️ MyStore</a></div>
            <div class="cart-icon" style="position: relative; font-size: 20px; cursor: pointer;">
                <i class="fa-solid fa-basket-shopping"></i>
                <span class="cart-badge" id="navCartBadge" style="position: absolute; top: -10px; right: -12px; background: #ff5722; color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 50%;">0</span>
            </div>
        </nav>
    </header>

    <main class="detail-container">
        <div id="detailView">
            <div class="detail-loading">Fetching single item data specifications...</div>
        </div>
    </main>

    <script src="scripts/product-detail.js"></script>
</body>
</html>
