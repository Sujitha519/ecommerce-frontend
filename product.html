<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details Configuration View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background-color: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <div class="logo">
                <a href="index.html" style="font-size: 24px; font-weight: 700; color: #333; text-decoration: none;">🛍️ MyStore</a>
            </div>
            <div class="cart-link-container">
                <a href="./cart.html" style="font-size: 16px; font-weight: 600; color: #ff5722; text-decoration: none; border: 1px solid #ff5722; padding: 8px 15px; border-radius: 4px; display: inline-block;">
                    <i class="fa-solid fa-basket-shopping"></i> Go To My Cart (<span id="navCartBadge">0</span>)
                </a>
            </div>
        </nav>
    </header>

    <main style="padding: 50px 5%; max-width: 1000px; margin: 0 auto;">
        <div style="display: flex; flex-wrap: wrap; gap: 40px;">
            <div style="flex: 1; min-width: 300px;">
                <img id="productZoomImg" src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=500" alt="Active Product Choice Selection" style="width: 100%; border-radius: 6px; border: 1px solid #eee;">
            </div>

            <div class="detail-info-box" style="flex: 1; min-width: 300px;">
                <h1 id="detailTitle" style="font-size: 32px; margin-bottom: 10px; color: #222;">Loading Product Option...</h1>
                <p id="detailPrice" style="font-size: 24px; font-weight: 700; color: #ff5722; margin-bottom: 20px;">$0.00</p>
                <p style="color: #666; line-height: 1.6; margin-bottom: 25px;">This premium item is crafted from high-quality materials, offering a durable construction and sleek style lines perfect for casual, daily, or premium utility outfitting configurations.</p>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #333;">Select Size Variant Option:</label>
                    <select id="sizeDropdown" style="padding: 10px; width: 100%; max-width: 200px; border-radius: 4px; border: 1px solid #ccc;">
                        <option value="S">Small (S)</option>
                        <option value="M" selected>Medium (M)</option>
                        <option value="L">Large (L)</option>
                        <option value="XL">Extra Large (XL)</option>
                    </select>
                </div>

                <div style="margin-bottom: 30px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: #333;">Quantity Tracker Amount:</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button type="button" onclick="adjustAmountInputCounter(-1)" style="padding: 5px 15px; font-size: 18px; font-weight: bold; cursor: pointer;">-</button>
                        <span id="quantityDisplayNumber" style="font-size: 18px; font-weight: 700; width: 30px; text-align: center;">1</span>
                        <button type="button" onclick="adjustAmountInputCounter(1)" style="padding: 5px 15px; font-size: 18px; font-weight: bold; cursor: pointer;">+</button>
                    </div>
                </div>

                <button id="addCartBtn" type="button" style="background: #ff5722; color: white; font-size: 16px; font-weight: 700; border: none; padding: 15px 40px; border-radius: 4px; cursor: pointer; text-transform: uppercase;">Add to Basket Bag</button>
                <div style="margin-top: 20px;"><a href="index.html" style="color: #666; text-decoration: none; font-size: 14px;"><i class="fa-solid fa-arrow-left"></i> Return Back To Homepage Storefront</a></div>
            </div>
        </div>
    </main>

    <script src="scripts/product-detail.js"></script>
</body>
</html>
