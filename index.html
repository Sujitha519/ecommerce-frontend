<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Frontend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-logo">
            <a href="#">Shop<span>Easy</span></a>
        </div>

        <div class="nav-search">
            <input type="text" placeholder="Search for products...">
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <nav class="nav-menu" id="navMenu">
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">Products</a>
            <a href="#" class="nav-link">About</a>
            <a href="#" class="nav-link">Contact</a>
        </nav>

        <div class="nav-icons">
            <a href="#" class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge">3</span>
            </a>
            <button class="menu-toggle" id="menuToggle">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

   <main>
        <section class="hero">
            <div class="hero-content">
                <span class="hero-tagline">🔥 Biggest Sale of the Year!</span>
                <h1>Upgrade Your Style, <br>Simplify Your Shopping</h1>
                <p>Discover exclusive weekly arrivals and premium collections tailored just for you. Enjoy free shipping on orders over $50!</p>
                
                <a href="#products" class="hero-btn">Shop New Arrivals <i class="fa-solid fa-arrow-right"></i></a>
            </div>
        </section>
        <section class="products-section" id="products">
        <h2 class="section-title">Featured Products</h2>
        
        <div class="product-grid" id="productGrid">
            </div>
    </section>
    </main>

    <script src="scripts/app.js"></script>
</body>
</html>
